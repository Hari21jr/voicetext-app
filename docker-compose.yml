version: "3.8"

services:
  api:
    build: ./api
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/app.db}
    volumes:
      - api-data:/app/data

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  api-data:
